name: Feature Request
description: Request a new feature.
labels: [ "type: feature" ]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: "What feature would you like to have? Please describe it here."
      placeholder: "Example: I want to be able to do..."
    validations:
      required: true
  - type: markdown
    attributes:
      value: Thank you for taking the time to fill out this feature request.
